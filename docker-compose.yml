services:

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: IAM
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - iam-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d IAM"]
      interval: 5s
      timeout: 5s
      retries: 10

  eureka:
    build:
      context: ./eureka
      network: host
    container_name: eureka
    ports:
      - "8761:8761"
    networks:
      - iam-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8761'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # config-server:
  #   build:
  #     context: ./config-server
  #     network: host
  #   container_name: config-server
  #   depends_on:
  #     eureka:
  #       condition: service_healthy
  #   networks:
  #     - iam-network

  identity-service:
    build:
      context: ./identity-service
      network: host
    container_name: identity-service
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/IAM
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      ADMIN_SERVICE_URL: http://admin-service:8082
    networks:
      - iam-network

  oauth-service:
    build:
      context: ./oauth-service
      network: host
    container_name: oauth-service
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/IAM
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
      IDENTITY_SERVICE_URL: http://identity-service:8081/api/identity
      ADMIN_SERVICE_URL: http://admin-service:8082
      JWT_PRIVATE_KEY_PATH: /app/keys/dev-private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/dev-public.pem
    volumes:
      - ./keys:/app/keys:ro
    networks:
      - iam-network

  admin-service:
    build:
      context: ./admin-service
      network: host
    container_name: admin-service
    depends_on:
      postgres:
        condition: service_healthy
      eureka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/IAM
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks:
      - iam-network

  gateway:
    build:
      context: ./gateway
      network: host
    container_name: gateway
    ports:
      - "9090:8080"
    depends_on:
      eureka:
        condition: service_healthy
      identity-service:
        condition: service_started
      oauth-service:
        condition: service_started
      admin-service:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks:
      - iam-network

volumes:
  postgres_data:

networks:
  iam-network:
    driver: bridge
