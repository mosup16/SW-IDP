services:

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: IAM
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - iam-network

  eureka:
    build:
      context: ./eureka
    container_name: eureka
    ports:
      - "8761:8761"
    networks:
      - iam-network

  config-server:
    build:
      context: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - eureka
    networks:
      - iam-network

  identity-service:
    build:
      context: ./identity-service
    container_name: identity-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - eureka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/IAM
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks:
      - iam-network

  oauth-service:
    build:
      context: ./oauth-service
    container_name: oauth-service
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - eureka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/IAM
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks:
      - iam-network

  admin-service:
    build:
      context: ./admin-service
    container_name: admin-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres
      - eureka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/IAM
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks:
      - iam-network

  gateway:
    build:
      context: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka
      - identity-service
      - oauth-service
      - admin-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka/
    networks:
      - iam-network

volumes:
  postgres_data:

networks:
  iam-network:
    driver: bridge