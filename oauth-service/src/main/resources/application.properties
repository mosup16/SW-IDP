spring.application.name=oauth-service
server.port=8083

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/IAM
spring.datasource.username=postgres
spring.datasource.password=12345
spring.jpa.properties.hibernate.default_schema=oauth

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.cloud.compatibility-verifier.enabled=false

# Internal service auth
internal.secret=${INTERNAL_SECRET:dev-internal-secret}

# Identity service
identity-service.url=${IDENTITY_SERVICE_URL:http://localhost:8081/api/identity}

# JWT
jwt.private-key-path=${JWT_PRIVATE_KEY_PATH:../keys/dev-private.pem}
jwt.public-key-path=${JWT_PUBLIC_KEY_PATH:../keys/dev-public.pem}
jwt.issuer=http://localhost:8083
jwt.access-token-ttl-mins=60
jwt.refresh-token-ttl-days=30
admin-service.url=${ADMIN_SERVICE_URL:http://localhost:8082}