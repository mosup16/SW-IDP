spring.application.name=gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.cloud.compatibility-verifier.enabled=false

# Internal service auth (must match identity-service)
internal.secret=${INTERNAL_SECRET:dev-internal-secret}

# Identity-service URL for session verification
identity-service.url=${IDENTITY_SERVICE_URL:http://localhost:8081/api/identity}