<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Role - Aegis Core</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2d3133",
                        "primary-fixed-dim": "#a8c8ff",
                        "surface-bright": "#f7f9fb",
                        "on-error-container": "#93000a",
                        "tertiary": "#000000",
                        "surface-variant": "#e0e3e5",
                        "secondary-container": "#d5e3fc",
                        "outline": "#76777d",
                        "on-surface-variant": "#45464d",
                        "primary-fixed": "#d6e3ff",
                        "surface-tint": "#005db5",
                        "secondary-fixed": "#d5e3fc",
                        "inverse-primary": "#a8c8ff",
                        "secondary": "#515f74",
                        "on-background": "#191c1e",
                        "on-secondary-container": "#57657a",
                        "surface-container-low": "#f2f4f6",
                        "on-secondary-fixed-variant": "#3a485b",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f7f9fb",
                        "surface": "#f7f9fb",
                        "on-tertiary-container": "#008cc7",
                        "on-surface": "#191c1e",
                        "surface-container-high": "#e6e8ea",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#89ceff",
                        "tertiary-fixed": "#c9e6ff",
                        "outline-variant": "#c6c6cd",
                        "on-primary-fixed": "#001b3d",
                        "on-tertiary-fixed": "#001e2f",
                        "on-primary-container": "#4184df",
                        "surface-container-highest": "#e0e3e5",
                        "on-tertiary-fixed-variant": "#004c6e",
                        "secondary-fixed-dim": "#b9c7df",
                        "surface-dim": "#d8dadc",
                        "on-secondary-fixed": "#0d1c2e",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#001e2f",
                        "primary-container": "#001b3d",
                        "error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#00468b",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "primary": "#000000",
                        "surface-container": "#eceef0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-headline { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-4 sm:p-8">
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 bg-inverse-surface/40 backdrop-blur-sm z-40 transition-opacity"></div>
<!-- Modal Container -->
<div class="relative z-50 w-full max-w-2xl bg-surface-container-lowest rounded-xl shadow-[0_12px_32px_rgba(25,28,30,0.12)] flex flex-col overflow-hidden">
<!-- Header -->
<div class="px-8 py-6 bg-surface-container-low flex items-center justify-between">
<div>
<h2 class="font-headline text-2xl font-bold text-on-surface tracking-tight">Edit Role</h2>
<p class="font-body text-sm text-on-surface-variant mt-1">Configure permissions for this access level.</p>
</div>
<button class="text-on-surface-variant hover:text-on-surface transition-colors p-2 rounded-full hover:bg-surface-container-highest">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Form Body -->
<div class="p-8 flex-1 overflow-y-auto">
<form class="space-y-8">
<!-- Basic Info Section -->
<div class="space-y-6">
<h3 class="font-headline text-sm font-semibold text-on-surface uppercase tracking-wider">Basic Information</h3>
<div class="space-y-4">
<!-- Role Name -->
<div>
<label class="block font-label text-sm font-medium text-on-surface mb-1" for="roleName">Role Name</label>
<input class="w-full bg-surface-container-high border-b-2 border-outline-variant focus:border-surface-tint focus:ring-0 px-4 py-3 rounded-t-DEFAULT text-on-surface font-body text-base transition-colors placeholder-on-surface-variant/50" id="roleName" placeholder="e.g. Administrator" type="text" value="Financial Analyst"/>
</div>
<!-- Description -->
<div>
<label class="block font-label text-sm font-medium text-on-surface mb-1" for="roleDescription">Description</label>
<textarea class="w-full bg-surface-container-high border-b-2 border-outline-variant focus:border-surface-tint focus:ring-0 px-4 py-3 rounded-t-DEFAULT text-on-surface font-body text-base transition-colors resize-none placeholder-on-surface-variant/50" id="roleDescription" rows="3">Read-only access to financial reporting and audit logs.</textarea>
</div>
</div>
</div>
<!-- Permissions Grid -->
<div class="space-y-6 pt-4">
<h3 class="font-headline text-sm font-semibold text-on-surface uppercase tracking-wider flex items-center gap-2">
<span class="material-symbols-outlined text-surface-tint" style="font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
                        Permissions Matrix
                    </h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Permission Group: Users -->
<div class="bg-surface rounded-lg p-4">
<h4 class="font-label font-medium text-on-surface mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-sm">group</span>
                                Users
                            </h4>
<div class="space-y-2">
<label class="flex items-center gap-3 cursor-pointer group">
<input checked="" class="w-4 h-4 text-surface-tint bg-surface-container-high border-outline-variant rounded focus:ring-surface-tint focus:ring-offset-surface" type="checkbox"/>
<span class="font-body text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">users.read</span>
</label>
<label class="flex items-center gap-3 cursor-pointer group">
<input class="w-4 h-4 text-surface-tint bg-surface-container-high border-outline-variant rounded focus:ring-surface-tint focus:ring-offset-surface" type="checkbox"/>
<span class="font-body text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">users.write</span>
</label>
</div>
</div>
<!-- Permission Group: Clients -->
<div class="bg-surface rounded-lg p-4">
<h4 class="font-label font-medium text-on-surface mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-sm">corporate_fare</span>
                                Clients
                            </h4>
<div class="space-y-2">
<label class="flex items-center gap-3 cursor-pointer group">
<input checked="" class="w-4 h-4 text-surface-tint bg-surface-container-high border-outline-variant rounded focus:ring-surface-tint focus:ring-offset-surface" type="checkbox"/>
<span class="font-body text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">clients.read</span>
</label>
<label class="flex items-center gap-3 cursor-pointer group">
<input class="w-4 h-4 text-surface-tint bg-surface-container-high border-outline-variant rounded focus:ring-surface-tint focus:ring-offset-surface" type="checkbox"/>
<span class="font-body text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">clients.manage</span>
</label>
</div>
</div>
<!-- Permission Group: Logs -->
<div class="bg-surface rounded-lg p-4 md:col-span-2">
<h4 class="font-label font-medium text-on-surface mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-sm">list_alt</span>
                                System Logs
                            </h4>
<div class="flex flex-wrap gap-4">
<label class="flex items-center gap-3 cursor-pointer group">
<input checked="" class="w-4 h-4 text-surface-tint bg-surface-container-high border-outline-variant rounded focus:ring-surface-tint focus:ring-offset-surface" type="checkbox"/>
<span class="font-body text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">logs.view</span>
</label>
<label class="flex items-center gap-3 cursor-pointer group">
<input class="w-4 h-4 text-surface-tint bg-surface-container-high border-outline-variant rounded focus:ring-surface-tint focus:ring-offset-surface" type="checkbox"/>
<span class="font-body text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">logs.export</span>
</label>
</div>
</div>
</div>
</div>
</form>
</div>
<!-- Footer Actions -->
<div class="px-8 py-5 bg-surface-container flex items-center justify-end gap-3">
<button class="px-6 py-2.5 rounded-lg font-label font-medium text-sm text-on-surface bg-secondary-container hover:bg-surface-variant active:scale-95 transition-all" type="button">
                Cancel
            </button>
<button class="px-6 py-2.5 rounded-lg font-label font-medium text-sm text-on-primary bg-gradient-to-r from-primary to-primary-container hover:from-primary-container hover:to-primary active:scale-95 transition-all shadow-sm" type="submit">
                Save Role
            </button>
</div>
</div>
</body></html>
