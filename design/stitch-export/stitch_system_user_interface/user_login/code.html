<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Sovereign IdP</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#191c1e",
                        "primary-fixed": "#d6e3ff",
                        "secondary-fixed": "#d5e3fc",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#008cc7",
                        "surface-container-highest": "#e0e3e5",
                        "on-primary": "#ffffff",
                        "surface": "#f7f9fb",
                        "on-secondary-fixed-variant": "#3a485b",
                        "primary-container": "#001b3d",
                        "primary-fixed-dim": "#a8c8ff",
                        "on-secondary-fixed": "#0d1c2e",
                        "background": "#f7f9fb",
                        "error": "#ba1a1a",
                        "surface-container": "#eceef0",
                        "on-primary-container": "#4184df",
                        "surface-variant": "#e0e3e5",
                        "surface-tint": "#005db5",
                        "secondary": "#515f74",
                        "on-secondary-container": "#57657a",
                        "inverse-on-surface": "#eff1f3",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#001e2f",
                        "on-primary-fixed-variant": "#00468b",
                        "tertiary": "#000000",
                        "inverse-primary": "#a8c8ff",
                        "tertiary-fixed": "#c9e6ff",
                        "on-tertiary-fixed": "#001e2f",
                        "on-surface": "#191c1e",
                        "on-tertiary-fixed-variant": "#004c6e",
                        "secondary-fixed-dim": "#b9c7df",
                        "on-primary-fixed": "#001b3d",
                        "secondary-container": "#d5e3fc",
                        "tertiary-fixed-dim": "#89ceff",
                        "inverse-surface": "#2d3133",
                        "surface-container-high": "#e6e8ea",
                        "on-surface-variant": "#45464d",
                        "error-container": "#ffdad6",
                        "outline-variant": "#c6c6cd",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#d8dadc",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f7f9fb",
                        "primary": "#000000",
                        "outline": "#76777d",
                        "surface-container-low": "#f2f4f6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
        }
        .ambient-shadow {
            box-shadow: 0 12px 32px rgba(25, 28, 30, 0.12);
        }
        .monolith-gradient {
            background: linear-gradient(135deg, #000000 0%, #001b3d 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed">
<main class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Abstract Background Monolith Shapes -->
<div class="absolute inset-0 pointer-events-none z-0">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[60%] bg-surface-container rounded-full opacity-40 blur-3xl"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[50%] h-[70%] bg-secondary-container opacity-30 blur-3xl rounded-full"></div>
</div>
<div class="w-full max-w-[440px] z-10">
<!-- Branding Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-14 h-14 bg-primary rounded-xl mb-6 ambient-shadow">
<span class="material-symbols-outlined text-on-primary text-3xl" style="font-variation-settings: 'FILL' 1;">shield_person</span>
</div>
<h1 class="font-headline font-black text-3xl tracking-tighter text-primary uppercase mb-2">Sovereign IdP</h1>
<p class="text-on-surface-variant font-medium text-sm tracking-tight">Identity Provisioning &amp; Governance</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-10 ambient-shadow border border-white/20">
<div class="mb-8">
<h2 class="font-headline font-bold text-2xl text-primary tracking-tight mb-2">Secure Access</h2>
<p class="text-on-surface-variant text-sm">Enter your credentials to manage your enterprise identity.</p>
</div>
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-[10px] uppercase font-bold tracking-[0.1em] text-on-surface-variant px-1" for="email">
                            Email Address
                        </label>
<div class="relative group">
<input class="w-full bg-surface-container-high border-0 border-b-2 border-outline-variant py-4 px-4 text-sm focus:ring-0 focus:border-surface-tint transition-all duration-300 placeholder:text-outline" id="email" placeholder="name@organization.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-[10px] uppercase font-bold tracking-[0.1em] text-on-surface-variant" for="password">
                                Password
                            </label>
<a class="text-[10px] font-bold uppercase tracking-wider text-surface-tint hover:opacity-80 transition-opacity" href="#">Forgot?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-high border-0 border-b-2 border-outline-variant py-4 px-4 text-sm focus:ring-0 focus:border-surface-tint transition-all duration-300 placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA -->
<div class="pt-4">
<button class="monolith-gradient w-full py-4 rounded-lg text-on-primary font-headline font-bold text-sm tracking-wide flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-lg shadow-primary/20">
                            Log In
                            <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-10 pt-8 border-t border-surface-container flex flex-col items-center gap-4">
<p class="text-on-surface-variant text-xs">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Register</a>
</p>
</div>
</div>
<!-- Footer Meta -->
<div class="mt-12 flex justify-center items-center gap-6">
<a class="text-[11px] font-medium text-outline hover:text-on-surface transition-colors flex items-center gap-1.5" href="#">
<span class="material-symbols-outlined text-[14px]">menu_book</span>
                    Documentation
                </a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="text-[11px] font-medium text-outline hover:text-on-surface transition-colors flex items-center gap-1.5" href="#">
<span class="material-symbols-outlined text-[14px] text-on-tertiary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                    System Status
                </a>
</div>
</div>
<!-- Ornamental Monolith Element -->
<div class="absolute bottom-12 right-12 hidden lg:block opacity-20">
<div class="flex flex-col gap-2">
<div class="h-12 w-1.5 bg-primary"></div>
<div class="h-6 w-1.5 bg-outline"></div>
<div class="h-3 w-1.5 bg-outline-variant"></div>
</div>
</div>
</main>
<!-- Decorative Image Overlay for texture -->
<div class="fixed inset-0 pointer-events-none mix-blend-soft-light opacity-[0.03] z-50">
<img alt="Subtle noise and grain texture for architectural depth" class="w-full h-full object-cover" data-alt="abstract monochromatic smooth grain texture with subtle gradients of dark slate and carbon for high-end aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-q-onv7RlVd8i3ua3gDNEnzF-AY7B4Y6QmbOFNCUO1FXqAtU_y2MssLZRe8PS51ZdnzIUy8l8RIYdWQB55Rrzai1ewE9SgQ10773w6JDV-cldXWjvD2ahSF5iLSjTr7yqQ1DWwlXlEQf-yMg39MwvEXyp2tKTvwx2H7CSJJuPqpgsiyzHGiPKtQYpXuOTUZVS4Kpatz6I07dbdS9QWr9My7x9MoV_cN0GfA8WHsv63zYlL8Ny3kit-QJ8_IEKEcxlre8VGIKIDbcm"/>
</div>
</body></html>
