spring.application.name=identity-service
server.port=8081
server.servlet.context-path=/api/identity

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1

spring.security.user.name=disable
spring.security.user.password=disable
# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/IAM
spring.datasource.username=postgres
spring.datasource.password=12345
spring.jpa.properties.hibernate.default_schema=identity
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Spring Cloud
spring.cloud.compatibility-verifier.enabled=false

# Internal service auth
internal.secret=${INTERNAL_SECRET:dev-internal-secret}
admin-service.url=${ADMIN_SERVICE_URL:http://localhost:8082}